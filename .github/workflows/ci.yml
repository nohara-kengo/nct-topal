name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Create dummy artifacts for validate
        run: |
          mkdir -p dist
          echo "dummy" | zip -q dist/layer.zip -
          echo "dummy" | zip -q dist/app.zip -

      - name: Terraform fmt check
        working-directory: infra
        run: terraform fmt -check

      - name: Terraform init (backend disabled)
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        env:
          TF_VAR_anthropic_api_key: ci-validate-only
          TF_VAR_slack_signing_secret: ci-validate-only
          TF_VAR_slack_bot_token: ci-validate-only
          TF_VAR_microsoft_app_id: ci-validate-only
          TF_VAR_microsoft_app_password: ci-validate-only
          TF_VAR_backlog_api_keys: '{"NOHARATEST":"ci-validate-only"}'
        run: terraform validate
