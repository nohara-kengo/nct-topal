name: Deploy to AWS

on:
  push:
    branches:
      - develop
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.set-env.outputs.env }}
      name_prefix: ${{ steps.set-env.outputs.name_prefix }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "env=prd" >> "$GITHUB_OUTPUT"
            echo "name_prefix=topal-prd" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
            echo "name_prefix=topal-dev" >> "$GITHUB_OUTPUT"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest tests/ -v

  deploy:
    needs: [setup, test]
    runs-on: ubuntu-latest
    # GitHub Environmentsで本番は手動承認を設定可能
    environment: ${{ needs.setup.outputs.env }}
    env:
      NAME_PREFIX: ${{ needs.setup.outputs.name_prefix }}
      TF_ENV: ${{ needs.setup.outputs.env }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Build Lambda layer
        run: |
          mkdir -p python dist
          pip install -r requirements.txt -t python/
          zip -rq dist/layer.zip python/
          rm -rf python/

      - name: Build app package
        run: zip -rq dist/app.zip src/

      - name: Terraform init
        working-directory: infra
        run: terraform init -backend-config="key=${TF_ENV}/terraform.tfstate"

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -var-file="envs/${TF_ENV}.tfvars" -no-color

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -var-file="envs/${TF_ENV}.tfvars" -auto-approve

      - name: Health check
        run: |
          API_URL=$(cd infra && terraform output -raw api_url)
          echo "API URL: $API_URL"
          curl -sf "$API_URL/health"

      - name: Verify Lambda functions
        run: |
          echo "=== Lambda functions (${TF_ENV}) ==="
          for fn in health task-create task-update teams-webhook slack-webhook task-worker report-scheduler; do
            aws lambda get-function --function-name "${NAME_PREFIX}-${fn}" --query 'Configuration.[FunctionName,Runtime,Timeout,State]' --output text
          done

      - name: Verify SQS queues
        run: |
          echo "=== SQS queues ==="
          QUEUE_URL=$(cd infra && terraform output -raw task_queue_url)
          aws sqs get-queue-attributes --queue-url "$QUEUE_URL" --attribute-names QueueArn RedrivePolicy VisibilityTimeout --output table
